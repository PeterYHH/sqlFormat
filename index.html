<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>SQL Formatter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.6.9/sql-formatter.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; }
    .container {
      width: 100%;
      box-sizing: border-box;
      padding: 24px clamp(16px, 4vw, 60px);
    }
    h1 { text-align: center; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    h1 .logo { width: 40px; height: 40px; flex-shrink: 0; }

    .input-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .input-label { font-weight: 500; font-size: 15px; }
    .input-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .input-meta span { font-size: 13px; color: #888; white-space: nowrap; }
    select {
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      padding: 6px 10px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 16px;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      resize: vertical;
      min-height: 200px;
    }
    textarea.drag-over { border-color: #0c4767; box-shadow: 0 0 0 3px rgba(12, 71, 103, 0.15); }

    /* ── 上方操作列 ── */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0 20px;
      flex-wrap: wrap;
    }
    .action-bar .spacer { margin-left: auto; }

    button {
      background-color: #0c4767;
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      transition: background-color 0.2s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:hover { background-color: #0a3d5a; }
    .btn-secondary { background-color: #6c757d; }
    .btn-secondary:hover { background-color: #5a6268; }
    .btn-ghost {
      background: transparent;
      color: #5a6b7b;
      border: 1px solid #ced4da;
    }
    .btn-ghost:hover { background: #f0f4f8; color: #333; }
    .btn-danger { background-color: #c0392b; }
    .btn-danger:hover { background-color: #a93226; }
    .shortcut { font-size: 11px; opacity: 0.65; }

    /* ── 下拉選單 ── */
    .dropdown { position: relative; }
    .dropdown-arrow { font-size: 10px; opacity: 0.8; }
    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: white;
      border: 1px solid #e2e8ed;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      min-width: 160px;
      z-index: 200;
      overflow: hidden;
    }
    .dropdown-menu.open { display: block; }
    .dropdown-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      color: #333;
      font-size: 14px;
      font-weight: 400;
      padding: 10px 16px;
      border-radius: 0;
      border: none;
    }
    .dropdown-menu button:hover { background: #f0f4f8; color: #0c4767; }
    .dropdown-menu .menu-divider {
      height: 1px;
      background: #e2e8ed;
      margin: 4px 0;
    }

    /* ── 結果區 ── */
    #resultContainer {
      background: #ffffff;
      border: 1px solid #e2e8ed;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(12, 71, 103, 0.08);
      overflow: hidden;
      margin: 0;
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f6 100%);
      border-bottom: 1px solid #e2e8ed;
    }
    .result-dots { display: flex; gap: 7px; flex-shrink: 0; }
    .result-dots span {
      width: 12px; height: 12px; border-radius: 50%; display: block;
      box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12);
    }
    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green { background: #28c840; }
    .result-title {
      color: #5a6b7b; font-size: 13px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    /* 結果區標題列裡的小按鈕 */
    .result-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .hdr-btn {
      background: transparent;
      color: #5a6b7b;
      border: 1px solid #d0d9e1;
      padding: 4px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .hdr-btn:hover { background: #e8eef3; color: #0c4767; border-color: #b0bec8; }

    /* 匯出下拉靠右對齊 */
    .dropdown-right .dropdown-menu { left: auto; right: 0; }

    .result-lang {
      color: #0c4767; font-size: 12px; font-weight: 500;
      background: rgba(12, 71, 103, 0.08);
      border: 1px solid rgba(12, 71, 103, 0.18);
      padding: 3px 11px; border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #resultBody { padding: 18px 20px; overflow-x: auto; background: #ffffff; }
    pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }
    #resultBody pre,
    #resultBody code[class*="language-"] {
      background: transparent !important;
      text-shadow: none !important;
    }
    code {
      color: #1f2d3a;
      font-family: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
      font-size: 14px; line-height: 1.65; text-shadow: none;
    }
    #result:empty::before {
      content: '格式化後的 SQL 會顯示在這裡…';
      color: #9aa7b2; font-style: italic;
    }
    /* 淺色語法高亮配色 */
    #resultBody .token { background: transparent !important; }
    #resultBody .token.keyword { color: #c0392b; font-weight: 600; }
    #resultBody .token.function { color: #8250df; }
    #resultBody .token.string,
    #resultBody .token.char { color: #1a7f37; }
    #resultBody .token.number { color: #b35900; }
    #resultBody .token.boolean,
    #resultBody .token.constant,
    #resultBody .token.null { color: #e36209; }
    #resultBody .token.operator { color: #0550ae; }
    #resultBody .token.punctuation { color: #6a737d; }
    #resultBody .token.comment { color: #8a99a6; font-style: italic; }
    #resultBody .token.variable { color: #1f2d3a; }
    /* MyBatis 佔位符 #{} / ${} 加底色，凸顯出來 */
    #resultBody .token.mybatis-param {
      background: #fff3bf !important;
      color: #7a5b00;
      border-radius: 3px;
      padding: 1px 4px;
      font-weight: 600;
    }
    /* MyBatis 動態標籤 <if> <where> 等，用獨立色與 SQL 關鍵字區分 */
    #resultBody .token.mybatis-tag { color: #7048e8; font-weight: 600; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #27ae60;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 15px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #c0392b; }

    /* 平板 */
    @media (max-width: 900px) {
      .input-meta { gap: 8px; }
      select { font-size: 13px; padding: 5px 8px; }
      .result-title { display: none; }
    }

    /* 手機 */
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .input-header { flex-direction: column; align-items: flex-start; }
      .input-meta { width: 100%; }
      .input-meta select { flex: 1; min-width: 0; }
      textarea { min-height: 160px; font-size: 14px; }
      .action-bar { gap: 6px; }
      .action-bar .spacer { width: 100%; margin: 0; }
      .result-actions { gap: 4px; }
      .hdr-btn { padding: 4px 8px; font-size: 11px; }
      .result-lang { display: none; }
    }

    /* 小手機 */
    @media (max-width: 400px) {
      .container { padding: 16px 12px; }
      h1 { font-size: 20px; }
      button { font-size: 13px; padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><img class="logo" src="favicon.svg" alt="">SQL Formatter</h1>

    <div class="input-header">
      <span class="input-label">輸入 SQL 語句</span>
      <div class="input-meta">
        <span id="inputMeta">0 行 · 0 字元</span>
        <select id="caseSelect">
          <option value="preserve">大小寫：原樣</option>
          <option value="upper">關鍵字大寫</option>
          <option value="lower">關鍵字小寫</option>
        </select>
        <select id="indentSelect">
          <option value="2">縮排 2 格</option>
          <option value="4">縮排 4 格</option>
          <option value="tab">縮排 Tab</option>
        </select>
        <select id="dialectSelect">
          <option value="sql">Standard SQL</option>
          <option value="mysql">MySQL</option>
          <option value="mariadb">MariaDB</option>
          <option value="postgresql">PostgreSQL</option>
          <option value="bigquery">BigQuery</option>
          <option value="tsql">T-SQL (SQL Server)</option>
          <option value="spark">Spark SQL</option>
          <option value="hive">HiveQL</option>
          <option value="sqlite">SQLite</option>
          <option value="snowflake">Snowflake</option>
          <option value="redshift">Redshift</option>
        </select>
      </div>
    </div>

    <textarea id="sqlInput" placeholder="請輸入 SQL 語句..."></textarea>

    <!-- 操作列：左側主操作 / 右側輔助 -->
    <div class="action-bar">
      <div class="dropdown" id="formatDropdown">
        <button class="dropdown-toggle" id="formatToggle">
          Format SQL <span class="shortcut">⌘↵</span> <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="formatMenu">
          <button id="formatKeepBtn">保留註解</button>
          <button id="formatRemoveBtn">移除註解</button>
        </div>
      </div>

      <div class="dropdown" id="minifyDropdown">
        <button class="btn-secondary dropdown-toggle" id="minifyToggle">
          Minify <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="minifyMenu">
          <button id="minifyKeepBtn">保留註解</button>
          <button id="minifyRemoveBtn">移除註解</button>
        </div>
      </div>

      <div class="dropdown" id="cdataDropdown">
        <button class="btn-secondary dropdown-toggle" id="cdataToggle">
          MyBatis <span class="dropdown-arrow">▾</span>
        </button>
        <div class="dropdown-menu" id="cdataMenu">
          <button id="cdataKeepBtn">保留註解</button>
          <button id="cdataRemoveBtn">移除註解</button>
        </div>
      </div>

      <div class="spacer"></div>

      <input type="file" id="fileInput" accept=".sql,.txt,text/plain" hidden>
      <button id="sampleBtn" class="btn-ghost">範例</button>
      <button id="importFileBtn" class="btn-ghost">匯入檔案</button>
      <button id="shareBtn" class="btn-ghost">分享連結</button>
      <button id="clearBtn" class="btn-danger">清空</button>
    </div>

    <div id="resultContainer">
      <div class="result-header">
        <div class="result-dots">
          <span class="dot-red"></span>
          <span class="dot-yellow"></span>
          <span class="dot-green"></span>
        </div>
        <span class="result-title">formatted.sql</span>

        <!-- 結果操作按鈕 -->
        <div class="result-actions">
          <button class="hdr-btn" id="copyClipboardBtn">複製文字</button>
          <div class="dropdown" id="downloadDropdown">
            <button class="hdr-btn dropdown-toggle" id="downloadToggle">
              下載檔案 <span class="dropdown-arrow">▾</span>
            </button>
            <div class="dropdown-menu" id="downloadMenu">
              <button id="downloadSqlBtn">下載 .sql</button>
              <button id="downloadTxtBtn">下載 .txt</button>
            </div>
          </div>
          <button class="hdr-btn" id="copyBtn">回填輸入</button>
          <div class="dropdown dropdown-right" id="exportDropdown">
            <button class="hdr-btn dropdown-toggle" id="exportToggle">
              匯出圖片 <span class="dropdown-arrow">▾</span>
            </button>
            <div class="dropdown-menu" id="exportMenu">
              <button id="downloadImageBtn">下載 PNG</button>
              <div class="menu-divider"></div>
              <button id="copyImageClipboardBtn">複製圖片至剪貼簿</button>
              <button id="copyBase64ClipboardBtn">複製 Base64</button>
            </div>
          </div>
        </div>

        <span class="result-lang" id="resultLang">Standard SQL</span>
      </div>
      <div id="resultBody">
        <pre><code id="result" class="language-sql"></code></pre>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const sqlInput = document.getElementById('sqlInput');
    const result = document.getElementById('result');
    const inputMeta = document.getElementById('inputMeta');
    const dialectSelect = document.getElementById('dialectSelect');
    const indentSelect = document.getElementById('indentSelect');
    const caseSelect = document.getElementById('caseSelect');
    const resultContainer = document.getElementById('resultContainer');
    const resultLang = document.getElementById('resultLang');
    const toast = document.getElementById('toast');

    // 讓 Prism 把 MyBatis 佔位符 #{} / ${} 認成獨立 token（排在 comment 前，
    // 否則 # 會被當成註解），搭配 CSS 加底色凸顯
    if (Prism.languages.sql) {
      Prism.languages.insertBefore('sql', 'comment', {
        'mybatis-param': { pattern: /[#$]\{[^}]*\}/ },
        'mybatis-tag': { pattern: /<\/?[a-zA-Z][\w:.-]*(?:\s+[a-zA-Z_:][\w:.-]*(?:\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+))?)*\s*\/?>/ }
      });
    }

    // ── 下拉選單開關 ──
    function setupDropdown(toggleId, menuId) {
      const toggle = document.getElementById(toggleId);
      const menu = document.getElementById(menuId);
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = menu.classList.contains('open');
        closeAllDropdowns();
        if (!isOpen) menu.classList.add('open');
      });
    }
    function closeAllDropdowns() {
      document.querySelectorAll('.dropdown-menu.open').forEach(m => m.classList.remove('open'));
    }
    document.addEventListener('click', closeAllDropdowns);
    setupDropdown('formatToggle', 'formatMenu');
    setupDropdown('minifyToggle', 'minifyMenu');
    setupDropdown('cdataToggle', 'cdataMenu');
    setupDropdown('downloadToggle', 'downloadMenu');
    setupDropdown('exportToggle', 'exportMenu');

    // 結果區標題列顯示目前資料庫
    function updateLang() {
      resultLang.textContent = dialectSelect.options[dialectSelect.selectedIndex].text;
    }

    // UTF-8 safe base64 encode/decode for URL sharing
    function encodeSQL(sql) {
      return btoa(String.fromCharCode(...new TextEncoder().encode(sql)));
    }
    function decodeSQL(b64) {
      try {
        return new TextDecoder().decode(Uint8Array.from(atob(b64), c => c.charCodeAt(0)));
      } catch {
        return null;
      }
    }

    function saveToStorage() {
      localStorage.setItem('sqlformat_sql', sqlInput.value);
      localStorage.setItem('sqlformat_dialect', dialectSelect.value);
      localStorage.setItem('sqlformat_indent', indentSelect.value);
      localStorage.setItem('sqlformat_case', caseSelect.value);
    }

    function loadFromStorage() {
      const params = new URLSearchParams(location.search);
      const urlSQL = params.get('sql');
      if (urlSQL) {
        const decoded = decodeSQL(urlSQL);
        if (decoded !== null) sqlInput.value = decoded;
        const urlDialect = params.get('dialect');
        if (urlDialect) dialectSelect.value = urlDialect;
        const urlIndent = params.get('indent');
        if (urlIndent) indentSelect.value = urlIndent;
        const urlCase = params.get('case');
        if (urlCase) caseSelect.value = urlCase;
      } else {
        const saved = localStorage.getItem('sqlformat_sql');
        if (saved) sqlInput.value = saved;
        const dialect = localStorage.getItem('sqlformat_dialect');
        if (dialect) dialectSelect.value = dialect;
        const indent = localStorage.getItem('sqlformat_indent');
        if (indent) indentSelect.value = indent;
        const kwCase = localStorage.getItem('sqlformat_case');
        if (kwCase) caseSelect.value = kwCase;
      }
    }

    let toastTimer;
    function showToast(msg, isError = false) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2500);
    }

    function updateMeta() {
      const text = sqlInput.value;
      const lines = text === '' ? 0 : text.split('\n').length;
      inputMeta.textContent = `${lines} 行 · ${text.length} 字元`;
    }

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    function getIndentOptions() {
      const val = indentSelect.value;
      if (val === 'tab') return { useTabs: true };
      return { tabWidth: parseInt(val) };
    }

    // 還原輸入裡的 CDATA 標記，讓帶 CDATA 的 SQL 也能正常格式化
    function unwrapCDATA(sql) {
      return sql.replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '');
    }

    // 清掉 <!-- -->、/* */、-- 三種註解，Format / Minify / MyBatis 的「移除註解」共用
    function stripComments(sql) {
      return sql
        .replace(/<!--[\s\S]*?-->/g, '')
        .replace(/\/\*[\s\S]*?\*\//g, '')
        .replace(/--[^\n]*/g, '');
    }

    // 保留註解時把 XML 註解 <!-- x --> 轉成 SQL 註解 /* x */，避免 sql-formatter 弄壞
    function xmlToSqlComments(sql) {
      return sql.replace(/<!--([\s\S]*?)-->/g, '/*$1*/');
    }

    // 統一前置處理：先還原 CDATA，再依需求移除或轉換註解
    function prepareInput(sql, removeComments) {
      sql = unwrapCDATA(sql);
      return removeComments ? stripComments(sql) : xmlToSqlComments(sql);
    }

    // 遮罩 MyBatis 佔位符 #{...} / ${...} 成安全代號，避免 sql-formatter 解析錯誤
    // （尤其 MySQL/MariaDB 的 # 是註解符號，直接送會把後半段吃成註解）
    function maskParams(sql) {
      const tokens = [];
      const masked = sql.replace(/#\{[^}]*\}|\$\{[^}]*\}/g, m => {
        tokens.push(m);
        return 'MBP' + (tokens.length - 1) + 'MBP';
      });
      return { masked, tokens };
    }

    // 格式化核心：遮罩佔位符 → sql-formatter → 修回被拆開的運算子 → 還原佔位符
    function formatCore(sql) {
      const { masked, tokens } = maskParams(sql);
      const formatted = sqlFormatter.format(masked, { language: dialectSelect.value, keywordCase: caseSelect.value, ...getIndentOptions() });
      return formatted
        .replace(/!\s+=/g, '!=')
        .replace(/\|\s+\|/g, '||')
        .replace(/<\s+=/g, '<=')
        .replace(/>\s+=/g, '>=')
        .replace(/<\s+>/g, '<>')
        .replace(/MBP(\d+)MBP/g, (_, i) => tokens[+i]);
    }

    // 把 sql-formatter 的英文錯誤轉成白話提示顯示在結果區
    // （不跳 toast，避免打字自動格式化時一直閃提示）
    function showFormatError(error) {
      const raw = String(error);
      let hint;
      if (/Unexpected|Parse error/i.test(raw)) {
        hint = dialectSelect.value === 'sql'
          ? '目前選的是「Standard SQL」，這段可能用到它不支援的語法（例如 & 位元運算）。試著把上方資料庫切成 MySQL 或你實際用的資料庫再試一次。'
          : '這段 SQL 無法解析，可能是資料庫類型不符或語法有誤。可換個資料庫，或檢查是否有打錯的地方。';
      } else {
        hint = '格式化失敗，請確認 SQL 語法是否正確。';
      }
      result.textContent = '⚠️ ' + hint;
      console.warn('[SQL Formatter] 格式化錯誤：', raw);
    }

    // 目前縮排選項對應的實際縮排字串（給動態標籤排版用）
    function getIndentString() {
      return indentSelect.value === 'tab' ? '\t' : ' '.repeat(parseInt(indentSelect.value));
    }

    // 是否含 MyBatis 動態標籤（<if>、<where>、<foreach> 等）
    function isDynamicMapper(sql) {
      return /<\/?(if|where|foreach|set|choose|when|otherwise|trim|bind|sql|include|selectKey)\b/i.test(sql);
    }

    // 比對單一 XML 標籤；屬性值用引號包住的部分允許含 > （例如 test="a > b"）
    const TAG_RE = /<\/?[a-zA-Z][\w:.-]*(?:\s+[a-zA-Z_:][\w:.-]*(?:\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+))?)*\s*\/?>/g;

    // 格式化一段 SQL 片段；片段不完整（例如以 AND 開頭）而格式化失敗時原樣保留
    function formatFragment(sql) {
      const t = sql.trim();
      if (!t) return null;
      try { return formatCore(t); }
      catch { return t; }
    }

    // 動態標籤感知格式化：標籤各自一行、依巢狀縮排，標籤間的 SQL 片段照常格式化
    function formatWithTags(sql) {
      const indent = getIndentString();
      const parts = [];
      let last = 0, m;
      TAG_RE.lastIndex = 0;
      while ((m = TAG_RE.exec(sql)) !== null) {
        if (m.index > last) parts.push({ type: 'sql', text: sql.slice(last, m.index) });
        parts.push({ type: 'tag', text: m[0] });
        last = m.index + m[0].length;
      }
      if (last < sql.length) parts.push({ type: 'sql', text: sql.slice(last) });

      const lines = [];
      let depth = 0;
      for (const p of parts) {
        if (p.type === 'tag') {
          const isClose = /^<\//.test(p.text);
          const isSelf = /\/>$/.test(p.text);
          if (isClose) depth = Math.max(0, depth - 1);
          lines.push(indent.repeat(depth) + p.text.trim());
          if (!isClose && !isSelf) depth++;
        } else {
          const f = formatFragment(p.text);
          if (f === null) continue;
          for (const ln of f.split('\n')) {
            lines.push(ln === '' ? '' : indent.repeat(depth) + ln);
          }
        }
      }
      return lines.join('\n');
    }

    function formatSQL(removeComments = false) {
      try {
        const prepared = prepareInput(sqlInput.value, removeComments);
        result.textContent = isDynamicMapper(prepared) ? formatWithTags(prepared) : formatCore(prepared);
        Prism.highlightElement(result);
      } catch (error) {
        showFormatError(error);
      }
    }

    // MyBatis：格式化後把比較運算子與 & 個別包成 CDATA（模式 A）
    function toMyBatis(removeComments) {
      try {
        let out = formatCore(prepareInput(sqlInput.value, removeComments));
        out = out.replace(/(<=|>=|<>|&&|<|>|&)/g, '<![CDATA[ $1 ]]>');
        result.textContent = out;
        Prism.highlightElement(result);
      } catch (error) {
        showFormatError(error);
      }
    }

    function minifySQL(removeComments) {
      try {
        let sql = unwrapCDATA(sqlInput.value);
        if (removeComments) sql = stripComments(sql);
        const minified = sql.replace(/\s+/g, ' ').replace(/\s*,\s*/g, ', ').trim();
        result.textContent = minified;
        Prism.highlightElement(result);
      } catch (error) {
        showFormatError(error);
      }
    }

    // ⌘↵ / Ctrl+↵
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        formatSQL();
      }
    });

    const debouncedFormat = debounce(formatSQL, 300);
    sqlInput.addEventListener('input', () => { updateMeta(); saveToStorage(); debouncedFormat(); });
    dialectSelect.addEventListener('change', () => { saveToStorage(); updateLang(); formatSQL(); });
    indentSelect.addEventListener('change', () => { saveToStorage(); formatSQL(); });
    caseSelect.addEventListener('change', () => { saveToStorage(); formatSQL(); });

    document.getElementById('formatKeepBtn').addEventListener('click', () => {
      closeAllDropdowns();
      formatSQL(false);
    });
    document.getElementById('formatRemoveBtn').addEventListener('click', () => {
      closeAllDropdowns();
      formatSQL(true);
    });

    document.getElementById('minifyKeepBtn').addEventListener('click', () => {
      closeAllDropdowns();
      minifySQL(false);
    });
    document.getElementById('minifyRemoveBtn').addEventListener('click', () => {
      closeAllDropdowns();
      minifySQL(true);
    });

    document.getElementById('cdataKeepBtn').addEventListener('click', () => {
      closeAllDropdowns();
      toMyBatis(false);
    });
    document.getElementById('cdataRemoveBtn').addEventListener('click', () => {
      closeAllDropdowns();
      toMyBatis(true);
    });

    document.getElementById('shareBtn').addEventListener('click', () => {
      const url = new URL(location.href);
      url.search = '';
      url.searchParams.set('sql', encodeSQL(sqlInput.value));
      url.searchParams.set('dialect', dialectSelect.value);
      url.searchParams.set('indent', indentSelect.value);
      url.searchParams.set('case', caseSelect.value);
      navigator.clipboard.writeText(url.toString())
        .then(() => showToast('分享連結已複製到剪貼簿！'))
        .catch(err => showToast('複製失敗：' + err, true));
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      sqlInput.value = '';
      result.textContent = '';
      updateMeta();
      saveToStorage();
    });

    // 一鍵載入範例：示範 #{} / ${} 佔位符、比較運算子與註解
    const SAMPLE_SQL = "select u.id, u.name, u.age, u.created_at from users u join dept d on u.dept_id = d.id where u.status = #{status} and u.age >= #{minAge} and d.code in (${deptCodes}) /* 只取在職員工 */ order by u.created_at desc limit 20";
    document.getElementById('sampleBtn').addEventListener('click', () => {
      sqlInput.value = SAMPLE_SQL;
      updateMeta();
      saveToStorage();
      formatSQL(false);
      showToast('已載入範例 SQL');
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      sqlInput.value = result.textContent;
      updateMeta();
      saveToStorage();
    });

    // 匯入 .sql / .txt 檔案：讀進輸入框並自動格式化
    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        sqlInput.value = reader.result;
        updateMeta();
        saveToStorage();
        formatSQL();
        showToast(`已匯入 ${file.name}`);
      };
      reader.onerror = () => showToast('讀取檔案失敗', true);
      reader.readAsText(file);
    }

    const fileInput = document.getElementById('fileInput');
    document.getElementById('importFileBtn').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) loadFile(fileInput.files[0]);
      fileInput.value = '';
    });

    // 直接把檔案拖進輸入框
    sqlInput.addEventListener('dragover', e => { e.preventDefault(); sqlInput.classList.add('drag-over'); });
    sqlInput.addEventListener('dragleave', () => sqlInput.classList.remove('drag-over'));
    sqlInput.addEventListener('drop', e => {
      e.preventDefault();
      sqlInput.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
    });

    // 下載格式化結果為 .sql 或 .txt 檔
    function downloadResult(ext) {
      closeAllDropdowns();
      const text = result.textContent;
      if (!text) { showToast('沒有可下載的內容', true); return; }
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'formatted_sql_' + Math.floor(Date.now() / 1000) + '.' + ext;
      link.click();
      URL.revokeObjectURL(link.href);
    }
    document.getElementById('downloadSqlBtn').addEventListener('click', () => downloadResult('sql'));
    document.getElementById('downloadTxtBtn').addEventListener('click', () => downloadResult('txt'));

    document.getElementById('copyClipboardBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(result.textContent)
        .then(() => showToast('格式化結果已複製到剪貼簿！'))
        .catch(err => showToast('複製失敗：' + err, true));
    });

    document.getElementById('downloadImageBtn').addEventListener('click', () => {
      closeAllDropdowns();
      html2canvas(resultContainer).then(canvas => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = 'formatted_sql_' + Math.floor(Date.now() / 1000) + '.png';
        link.click();
      });
    });

    document.getElementById('copyImageClipboardBtn').addEventListener('click', () => {
      closeAllDropdowns();
      html2canvas(resultContainer).then(canvas => {
        canvas.toBlob(blob => {
          if (!blob) return;
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(() => showToast('圖片已複製到剪貼簿！'))
            .catch(err => showToast('複製失敗：' + err, true));
        }, 'image/png');
      });
    });

    document.getElementById('copyBase64ClipboardBtn').addEventListener('click', () => {
      closeAllDropdowns();
      html2canvas(resultContainer).then(canvas => {
        navigator.clipboard.writeText(canvas.toDataURL('image/png'))
          .then(() => showToast('圖片的 Base64 已複製到剪貼簿！'))
          .catch(err => showToast('複製失敗：' + err, true));
      });
    });

    loadFromStorage();
    updateMeta();
    updateLang();
    if (sqlInput.value) formatSQL();
  </script>
</body>
</html>
