<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>SQL 即時格式化工具</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql-formatter/15.6.9/sql-formatter.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; }
    .container {
      width: 100%;
      box-sizing: border-box;
      padding: 24px clamp(16px, 4vw, 60px);
    }
    h1, h2 { text-align: center; margin-bottom: 20px; }
    h1 { display: flex; align-items: center; justify-content: center; gap: 12px; }
    h1 .logo { width: 40px; height: 40px; flex-shrink: 0; }

    .input-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .input-label { font-weight: 500; font-size: 15px; }
    .input-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .input-meta span { font-size: 13px; color: #888; white-space: nowrap; }
    select {
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
      padding: 6px 10px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      background: white;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 16px;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      resize: vertical;
      min-height: 200px;
    }

    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }

    button {
      background-color: #0c4767;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      transition: background-color 0.3s ease;
      white-space: nowrap;
    }
    button:hover { background-color: #0a3d5a; }
    button.secondary { background-color: #6c757d; }
    button.secondary:hover { background-color: #5a6268; }
    button.danger { background-color: #c0392b; }
    button.danger:hover { background-color: #a93226; }
    .shortcut { font-size: 12px; opacity: 0.7; margin-left: 6px; }

    /* 結果區：淺色程式編輯器風格 */
    #resultContainer {
      background: #ffffff;
      border: 1px solid #e2e8ed;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(12, 71, 103, 0.08);
      overflow: hidden;
      margin: 16px 0;
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f6 100%);
      border-bottom: 1px solid #e2e8ed;
    }
    .result-dots { display: flex; gap: 7px; }
    .result-dots span {
      width: 12px; height: 12px; border-radius: 50%; display: block;
      box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.12);
    }
    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green { background: #28c840; }
    .result-title {
      color: #5a6b7b; font-size: 13px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      letter-spacing: 0.3px;
    }
    .result-lang {
      margin-left: auto;
      color: #0c4767; font-size: 12px; font-weight: 500;
      background: rgba(12, 71, 103, 0.08);
      border: 1px solid rgba(12, 71, 103, 0.18);
      padding: 3px 11px; border-radius: 20px;
      white-space: nowrap;
    }
    #resultBody { padding: 18px 20px; overflow-x: auto; background: #ffffff; }
    pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }
    #resultBody pre,
    #resultBody code[class*="language-"] {
      background: transparent !important;
      text-shadow: none !important;
    }
    code {
      color: #1f2d3a;
      font-family: 'SF Mono', Menlo, Consolas, 'Courier New', monospace;
      font-size: 14px; line-height: 1.65; text-shadow: none;
    }
    #result:empty::before {
      content: '格式化後的 SQL 會顯示在這裡…';
      color: #9aa7b2; font-style: italic;
    }
    /* 淺色語法高亮配色（覆寫 Prism 預設） */
    #resultBody .token { background: transparent !important; }
    #resultBody .token.keyword { color: #0c4767; font-weight: 600; }
    #resultBody .token.function { color: #8250df; }
    #resultBody .token.string,
    #resultBody .token.char { color: #1a7f37; }
    #resultBody .token.number { color: #b35900; }
    #resultBody .token.boolean,
    #resultBody .token.constant,
    #resultBody .token.null { color: #b35900; }
    #resultBody .token.operator { color: #0c4767; }
    #resultBody .token.punctuation { color: #6a737d; }
    #resultBody .token.comment { color: #8a99a6; font-style: italic; }
    #resultBody .token.variable { color: #1f2d3a; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #27ae60;
      color: white;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 15px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #c0392b; }

    /* 平板 */
    @media (max-width: 900px) {
      .input-meta { gap: 8px; }
      select { font-size: 13px; padding: 5px 8px; }
    }

    /* 手機 */
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      h2 { font-size: 18px; }
      .input-header { flex-direction: column; align-items: flex-start; }
      .input-meta { width: 100%; }
      .input-meta select { flex: 1; min-width: 0; }
      textarea { min-height: 160px; font-size: 14px; }
      .btn-group { flex-direction: column; }
      button { width: 100%; }
    }

    /* 小手機 */
    @media (max-width: 400px) {
      .container { padding: 16px 12px; }
      h1 { font-size: 20px; }
      button { font-size: 14px; padding: 9px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><img class="logo" src="favicon.svg" alt="">SQL 即時格式化工具</h1>

    <div class="input-header">
      <span class="input-label">輸入 SQL 語句</span>
      <div class="input-meta">
        <span id="inputMeta">0 行 · 0 字元</span>
        <select id="indentSelect">
          <option value="2">縮排 2 格</option>
          <option value="4">縮排 4 格</option>
          <option value="tab">縮排 Tab</option>
        </select>
        <select id="dialectSelect">
          <option value="sql">Standard SQL</option>
          <option value="mysql">MySQL</option>
          <option value="mariadb">MariaDB</option>
          <option value="postgresql">PostgreSQL</option>
          <option value="bigquery">BigQuery</option>
          <option value="tsql">T-SQL (SQL Server)</option>
          <option value="spark">Spark SQL</option>
          <option value="hive">HiveQL</option>
          <option value="sqlite">SQLite</option>
          <option value="snowflake">Snowflake</option>
          <option value="redshift">Redshift</option>
        </select>
      </div>
    </div>

    <textarea id="sqlInput" placeholder="請輸入 SQL 語句..."></textarea>

    <div class="btn-group">
      <button id="formatBtn">Format SQL <span class="shortcut">⌘↵</span></button>
      <button id="minifyKeepBtn" class="secondary">Minify（含註解）</button>
      <button id="minifyRemoveBtn" class="secondary">Minify（移除註解）</button>
      <button id="shareBtn" class="secondary">複製分享連結</button>
      <button id="clearBtn" class="danger">清空</button>
    </div>

    <h2>格式化後結果：</h2>
    <div id="resultContainer">
      <div class="result-header">
        <div class="result-dots"><span class="dot-red"></span><span class="dot-yellow"></span><span class="dot-green"></span></div>
        <span class="result-title">formatted.sql</span>
        <span class="result-lang" id="resultLang">Standard SQL</span>
      </div>
      <div id="resultBody">
        <pre><code id="result" class="language-sql"></code></pre>
      </div>
    </div>

    <div class="btn-group">
      <button id="copyBtn">複製結果至輸入區</button>
      <button id="copyClipboardBtn">複製結果至剪貼簿</button>
      <button id="downloadImageBtn">下載為圖片</button>
      <button id="copyImageClipboardBtn">圖片複製至剪貼簿</button>
      <button id="copyBase64ClipboardBtn">圖片轉 Base64 至剪貼簿</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const sqlInput = document.getElementById('sqlInput');
    const result = document.getElementById('result');
    const inputMeta = document.getElementById('inputMeta');
    const dialectSelect = document.getElementById('dialectSelect');
    const indentSelect = document.getElementById('indentSelect');
    const resultContainer = document.getElementById('resultContainer');
    const resultLang = document.getElementById('resultLang');
    const toast = document.getElementById('toast');

    // 結果區標題列顯示目前選擇的 SQL 方言
    function updateLang() {
      resultLang.textContent = dialectSelect.options[dialectSelect.selectedIndex].text;
    }

    // UTF-8 safe base64 encode/decode for URL sharing
    function encodeSQL(sql) {
      return btoa(String.fromCharCode(...new TextEncoder().encode(sql)));
    }
    function decodeSQL(b64) {
      try {
        return new TextDecoder().decode(Uint8Array.from(atob(b64), c => c.charCodeAt(0)));
      } catch {
        return null;
      }
    }

    function saveToStorage() {
      localStorage.setItem('sqlformat_sql', sqlInput.value);
      localStorage.setItem('sqlformat_dialect', dialectSelect.value);
      localStorage.setItem('sqlformat_indent', indentSelect.value);
    }

    function loadFromStorage() {
      const params = new URLSearchParams(location.search);
      const urlSQL = params.get('sql');
      if (urlSQL) {
        const decoded = decodeSQL(urlSQL);
        if (decoded !== null) sqlInput.value = decoded;
        const urlDialect = params.get('dialect');
        if (urlDialect) dialectSelect.value = urlDialect;
        const urlIndent = params.get('indent');
        if (urlIndent) indentSelect.value = urlIndent;
      } else {
        const saved = localStorage.getItem('sqlformat_sql');
        if (saved) sqlInput.value = saved;
        const dialect = localStorage.getItem('sqlformat_dialect');
        if (dialect) dialectSelect.value = dialect;
        const indent = localStorage.getItem('sqlformat_indent');
        if (indent) indentSelect.value = indent;
      }
    }

    let toastTimer;
    function showToast(msg, isError = false) {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      toastTimer = setTimeout(() => { toast.className = 'toast'; }, 2500);
    }

    function updateMeta() {
      const text = sqlInput.value;
      const lines = text === '' ? 0 : text.split('\n').length;
      inputMeta.textContent = `${lines} 行 · ${text.length} 字元`;
    }

    function debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(this, args), wait);
      };
    }

    function getIndentOptions() {
      const val = indentSelect.value;
      if (val === 'tab') return { useTabs: true };
      return { tabWidth: parseInt(val) };
    }

    function formatSQL() {
      try {
        const sql = sqlInput.value;
        const dialect = dialectSelect.value;
        let formatted = sqlFormatter.format(sql, { language: dialect, ...getIndentOptions() });
        formatted = formatted.replace(/!\s+=/g, '!=').replace(/\|\s+\|/g, '||');
        result.textContent = formatted;
        Prism.highlightElement(result);
      } catch (error) {
        result.textContent = '格式化出現錯誤：' + error;
      }
    }

    function minifySQL(removeComments) {
      try {
        let sql = sqlInput.value;
        if (removeComments) {
          sql = sql.replace(/\/\*[\s\S]*?\*\//g, '');
          sql = sql.replace(/--[^\n]*/g, '');
        }
        const minified = sql.replace(/\s+/g, ' ').replace(/\s*,\s*/g, ', ').trim();
        result.textContent = minified;
        Prism.highlightElement(result);
      } catch (error) {
        result.textContent = 'Minify 出現錯誤：' + error;
      }
    }

    // Cmd+Enter (Mac) / Ctrl+Enter (Windows) 觸發 Format
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        formatSQL();
      }
    });

    const debouncedFormat = debounce(formatSQL, 300);
    sqlInput.addEventListener('input', () => { updateMeta(); saveToStorage(); debouncedFormat(); });
    dialectSelect.addEventListener('change', () => { saveToStorage(); updateLang(); formatSQL(); });
    indentSelect.addEventListener('change', () => { saveToStorage(); formatSQL(); });

    document.getElementById('formatBtn').addEventListener('click', formatSQL);
    document.getElementById('minifyKeepBtn').addEventListener('click', () => minifySQL(false));
    document.getElementById('minifyRemoveBtn').addEventListener('click', () => minifySQL(true));

    document.getElementById('shareBtn').addEventListener('click', () => {
      const url = new URL(location.href);
      url.search = '';
      url.searchParams.set('sql', encodeSQL(sqlInput.value));
      url.searchParams.set('dialect', dialectSelect.value);
      url.searchParams.set('indent', indentSelect.value);
      navigator.clipboard.writeText(url.toString())
        .then(() => showToast('分享連結已複製到剪貼簿！'))
        .catch(err => showToast('複製失敗：' + err, true));
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      sqlInput.value = '';
      result.textContent = '';
      updateMeta();
      saveToStorage();
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      sqlInput.value = result.textContent;
      updateMeta();
      saveToStorage();
    });

    document.getElementById('copyClipboardBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(result.textContent)
        .then(() => showToast('格式化結果已複製到剪貼簿！'))
        .catch(err => showToast('複製失敗：' + err, true));
    });

    document.getElementById('downloadImageBtn').addEventListener('click', () => {
      html2canvas(resultContainer).then(canvas => {
        const link = document.createElement('a');
        link.href = canvas.toDataURL('image/png');
        link.download = 'formatted_sql_' + Math.floor(Date.now() / 1000) + '.png';
        link.click();
      });
    });

    document.getElementById('copyImageClipboardBtn').addEventListener('click', () => {
      html2canvas(resultContainer).then(canvas => {
        canvas.toBlob(blob => {
          if (!blob) return;
          navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
            .then(() => showToast('圖片已複製到剪貼簿！'))
            .catch(err => showToast('複製失敗：' + err, true));
        }, 'image/png');
      });
    });

    document.getElementById('copyBase64ClipboardBtn').addEventListener('click', () => {
      html2canvas(resultContainer).then(canvas => {
        navigator.clipboard.writeText(canvas.toDataURL('image/png'))
          .then(() => showToast('圖片的 Base64 已複製到剪貼簿！'))
          .catch(err => showToast('複製失敗：' + err, true));
      });
    });

    loadFromStorage();
    updateMeta();
    updateLang();
    if (sqlInput.value) formatSQL();
  </script>
</body>
</html>
